<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animated Hello World</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#0f172a,#1e293b);
      overflow:hidden;
      font-family: Arial, sans-serif;
    }

    h1{
      font-size:80px;
      color:white;
      letter-spacing:5px;
      animation: glow 2s infinite alternate,
                 bounce 2s infinite;
    }

    @keyframes glow{
      from{
        text-shadow:
          0 0 10px #00ffff,
          0 0 20px #00ffff,
          0 0 40px #00ffff;
      }

      to{
        text-shadow:
          0 0 20px #ff00ff,
          0 0 40px #ff00ff,
          0 0 80px #ff00ff;
      }
    }

    @keyframes bounce{
      0%,100%{
        transform: translateY(0);
      }

      50%{
        transform: translateY(-20px);
      }
    }
  </style>
</head>
<body>

  <h1>Hello World Suraj</h1>

</body>
</html>
